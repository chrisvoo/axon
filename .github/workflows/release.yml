name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build assets
        run: make release-assets
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            axon-linux-amd64.tar.gz
            axon-linux-arm64.tar.gz
            axon-darwin-amd64.tar.gz
            axon-darwin-arm64.tar.gz
            axon-windows-amd64.zip
            axon-windows-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
